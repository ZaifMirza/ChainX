name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Quick checks for PR
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check for TODOs
        run: |
          # Check for TODO comments that should be addressed
          TODO_COUNT=$(grep -r "TODO" --include="*.rs" src/ | wc -l)
          echo "Found $TODO_COUNT TODO comments"
          if [ "$TODO_COUNT" -gt 0 ]; then
            echo "::warning::Found $TODO_COUNT TODO comments in the codebase"
            grep -rn "TODO" --include="*.rs" src/
          fi

  # Run tests
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: quick-check
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Run tests
        run: cargo test --verbose

  # Check for breaking changes
  semver-check:
    name: Semver Check
    runs-on: ubuntu-latest
    needs: quick-check
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-semver-checks
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-semver-checks

      - name: Check semver compatibility
        run: cargo semver-checks
        continue-on-error: true

  # Check documentation builds
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    needs: quick-check
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build documentation
        run: cargo doc --no-deps --document-private-items
        env:
          RUSTDOCFLAGS: -D warnings

  # Size check for PR changes
  size-check:
    name: Size Check
    runs-on: ubuntu-latest
    needs: quick-check
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build release binary
        run: cargo build --release

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s "target/release/chainx" 2>/dev/null || stat -f%z "target/release/chainx")
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Binary size: $SIZE_MB MB"
          if [ "$SIZE_MB" -gt 20 ]; then
            echo "::warning::Binary size is larger than 20 MB ($SIZE_MB MB)"
          fi

  # PR Labeler
  labeler:
    name: Label PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Label based on files changed
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: true

  # Auto-assign reviewers
  auto-assign:
    name: Auto Assign
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write
    steps:
      - name: Auto-assign reviewers
        uses: kentaro-m/auto-assign-action@v2.0.0
        continue-on-error: true
