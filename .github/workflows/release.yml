name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: chainx
            archive_name: chainx-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: chainx
            archive_name: chainx-linux-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: chainx.exe
            archive_name: chainx-windows-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: chainx
            archive_name: chainx-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: chainx
            archive_name: chainx-macos-aarch64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-on-failure: true

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          mkdir -p ${{ matrix.archive_name }}
          cp ${{ matrix.artifact_name }} ${{ matrix.archive_name }}/
          tar -czvf ${{ matrix.archive_name }}.tar.gz ${{ matrix.archive_name }}

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          mkdir ${{ matrix.archive_name }}
          copy ${{ matrix.artifact_name }} ${{ matrix.archive_name }}/
          7z a ${{ matrix.archive_name }}.zip ${{ matrix.archive_name }}

      - name: Upload artifact (Unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.archive_name }}.tar.gz
          retention-days: 1

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.archive_name }}.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          # Generate version based on date and short commit SHA
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -name "*.tar.gz" -exec cp {} release-assets/ \;
          find artifacts -name "*.zip" -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ChainX ${{ steps.version.outputs.VERSION }}
          body: |
            ## ChainX ${{ steps.version.outputs.VERSION }}
            
            Automated release from main branch.
            
            ### Downloads
            - **Linux x86_64**: `chainx-linux-x86_64.tar.gz`
            - **Linux ARM64**: `chainx-linux-aarch64.tar.gz`
            - **Windows x86_64**: `chainx-windows-x86_64.zip`
            - **macOS Intel**: `chainx-macos-x86_64.tar.gz`
            - **macOS Apple Silicon**: `chainx-macos-aarch64.tar.gz`
          draft: false
          prerelease: false
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
